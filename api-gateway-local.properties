spring.application.name=api-gateway
server.port=8080

# ===================== Gateway Routes =====================

# User Service auth, users, addresses
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**, /api/auth/**, /api/addresses/**

# Product Catalog Service products, categories, reviews, favorites
spring.cloud.gateway.routes[1].id=product-catalog-service
spring.cloud.gateway.routes[1].uri=lb://product-catalog-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**, /api/categories/**, /api/reviews/**, /api/favorites/**

# Order/Sales Service orders, carts, coupons
spring.cloud.gateway.routes[2].id=revshop-order-sales-service
spring.cloud.gateway.routes[2].uri=lb://sales-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**, /api/carts/**, /api/coupons/**

# Payment Service payments, wallets
spring.cloud.gateway.routes[3].id=revshop-payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**, /api/wallets/**

# Shipping Service shippers, tracking
spring.cloud.gateway.routes[4].id=revshop-shipping-service
spring.cloud.gateway.routes[4].uri=lb://shipping-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/shippers/**, /api/tracking/**

# Notification Service notifications
spring.cloud.gateway.routes[5].id=revshop-notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**

# Inventory Service inventory
spring.cloud.gateway.routes[6].id=revshop-inventory-service
spring.cloud.gateway.routes[6].uri=lb://inventory-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/inventory/**

# Upload / Images (served via Catalog Service)
spring.cloud.gateway.routes[7].id=upload-service
spring.cloud.gateway.routes[7].uri=lb://product-catalog-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/upload/**, /api/images/**

# AI Chat Service
spring.cloud.gateway.routes[8].id=revshop-ai-chat-service
spring.cloud.gateway.routes[8].uri=lb://revshop-ai-chat-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/chat/**

# ===================== Discovery =====================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ===================== Eureka Client =====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ===================== Logging =====================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO

# Zipkin / Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
