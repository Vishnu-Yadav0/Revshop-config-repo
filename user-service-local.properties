spring.application.name=user-service
server.port=8081

# Config Server Import
spring.config.import=optional:config-server:http://localhost:8888

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/revshop_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# JPA / Hibernate - OPTIMIZED FOR LOCAL
# Only use 'update' when you change your entities, otherwise 'none' is much faster
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=vM63s.r0.C8tW2NUn.4K.O/Qz0v6yGv7C6fN6yFz6uG9fN6yFz6uG
jwt.expiration=86400000

# Eureka - FAST LOCAL DISCOVERY
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.registry-fetch-interval-seconds=5
eureka.instance.lease-renewal-interval-in-seconds=5

# Zipkin / Distributed Tracing - REDUCED OVERHEAD
management.tracing.sampling.probability=0.1
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Performance Optimization
spring.main.lazy-initialization=true
